<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALLERY | NEWBIE QUEST</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap');

    :root {
      --yellow: #F5C800;
      --yellow-light: #FDE96B;
      --yellow-dark: #C9A400;
      --navy: #1A2340;
      --navy-mid: #253060;
      --red: #CC2222;
      --white: #FAFAF5;
      --gray: #E8E8E0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--white);
      color: var(--navy);
    }

    /* ===== HEADER ===== */
    header {
      background: var(--navy);
      border-bottom: 4px solid var(--yellow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .site-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--yellow);
      letter-spacing: 0.08em;
      text-decoration: none;
    }

    .site-logo span { color: var(--red); }

    nav { display: flex; gap: 4px; }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 2px;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    nav a:hover, nav a.active {
      background: var(--yellow);
      color: var(--navy);
    }

    /* ===== PAGE TITLE ===== */
    .page-header {
      background: var(--navy);
      padding: 32px 20px 28px;
    }

    .page-header-inner {
      max-width: 1000px;
      margin: 0 auto;
    }

    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--yellow);
      letter-spacing: 0.08em;
    }

    .page-header p {
      color: rgba(250,250,245,0.5);
      font-size: 0.78rem;
      margin-top: 4px;
    }

    /* ===== MAIN ===== */
    .main-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* ===== NOTICE ===== */
    .notice {
      border-left: 4px solid var(--red);
      background: #FFF5F5;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    /* ===== GALLERY GRID ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      border: 2px solid var(--gray);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .gallery-item:hover {
      border-color: var(--yellow);
      transform: translateY(-2px);
    }

    .gallery-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--navy-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      overflow: hidden;
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* alternate placeholder colors */
    .gallery-item:nth-child(3n+2) .gallery-thumb { background: var(--navy); }
    .gallery-item:nth-child(3n+3) .gallery-thumb { background: #2A1A1A; }

    .gallery-caption {
      padding: 10px 12px;
      background: var(--white);
    }

    .gallery-caption .cap-title {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 2px;
    }

    .gallery-caption .cap-tag {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.06em;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 30, 0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      max-width: 720px;
      width: 100%;
      position: relative;
    }

    .lightbox-img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      background: var(--navy-mid);
      aspect-ratio: 1/1;
    }

    .lightbox-caption {
      background: var(--navy);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lightbox-caption .lb-title {
      color: var(--white);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .lightbox-caption .lb-tag {
      color: var(--yellow);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .lightbox-close:hover { opacity: 1; }

    /* ===== FOOTER ===== */
    footer {
      background: var(--navy);
      border-top: 4px solid var(--yellow);
      padding: 28px 20px;
      text-align: center;
    }

    footer .footer-nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    footer .footer-nav a {
      color: rgba(250,250,245,0.55);
      text-decoration: none;
      font-size: 0.78rem;
      transition: color 0.15s;
    }

    footer .footer-nav a:hover { color: var(--yellow); }

    footer small {
      color: rgba(250,250,245,0.35);
      font-size: 0.72rem;
    }

    @media (max-width: 600px) {
      .header-inner { height: 50px; }
      nav a { padding: 5px 8px; font-size: 0.72rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="site-logo">NEWBIE<span>QUEST</span></a>
      <nav>
        <a href="index.html">HOME</a>
        <a href="blog.html">BLOG</a>
        <a href="ranking.html">RANKING</a>
        <a href="gallery.html" class="active">GALLERY</a>
        <a href="about.html">ABOUT</a>
      </nav>
    </div>
  </header>

  <!-- PAGE TITLE -->
  <div class="page-header">
    <div class="page-header-inner">
      <h1>GALLERY</h1>
      <p>二次創作イラスト置き場</p>
    </div>
  </div>

  <div class="main-wrap">

    <div class="notice">
      ※ こちらの作品はすべて二次創作ファンアートです。各作品の権利は原著作者に帰属します。無断転載・商用利用はご遠慮ください。
    </div>

    <!-- GALLERY GRID -->
    <div class="gallery-grid">

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

      <div class="gallery-item" onclick="openLightbox('IMAGE PATH', 'タイトル', 'ジャンル')">
        <div class="gallery-thumb">IMAGE</div>
        <div class="gallery-caption">
          <div class="cap-title">タイトル</div>
          <div class="cap-tag">ジャンル</div>
        </div>
      </div>

    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner">
      <button class="lightbox-close" onclick="closeLightbox()">✕ CLOSE</button>
      <div class="lightbox-img" id="lb-img"></div>
      <div class="lightbox-caption">
        <span class="lb-title" id="lb-title"></span>
        <span class="lb-tag" id="lb-tag"></span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-nav">
      <a href="index.html">HOME</a>
      <a href="blog.html">BLOG</a>
      <a href="ranking.html">RANKING</a>
      <a href="gallery.html">GALLERY</a>
      <a href="about.html">ABOUT</a>
    </div>
    <small>&copy; NEWBIE QUEST. All rights reserved.</small>
  </footer>

  <script>
    function openLightbox(src, title, tag) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lb-img');
      const lbTitle = document.getElementById('lb-title');
      const lbTag = document.getElementById('lb-tag');

      if (src && src !== 'IMAGE PATH') {
        img.style.backgroundImage = `url(${src})`;
        img.style.backgroundSize = 'contain';
        img.style.backgroundRepeat = 'no-repeat';
        img.style.backgroundPosition = 'center';
      }
      lbTitle.textContent = title;
      lbTag.textContent = tag;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
